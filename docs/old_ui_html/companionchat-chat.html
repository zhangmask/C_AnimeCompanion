<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompanionChat - 对话</title>
<style>
:root {
  --primary: #7C5CBF;
  --primary-light: #A88DE0;
  --primary-container: #EDE5FF;
  --secondary: #D4688C;
  --secondary-container: #FFE0EB;
  --on-primary: #FFFFFF;
  --surface: #FFFFFF;
  --surface-dim: #F7F5FA;
  --surface-container: #F2EFF6;
  --background: #FDFCFE;
  --on-surface: #1C1B1F;
  --on-surface-variant: #49454F;
  --outline: #79747E;
  --outline-variant: #CAC4D0;
  --outline-light: #E8E4EC;
  --error: #B3261E;
  --error-container: #F9DEDC;
  --success: #2E7D52;
  --font: -apple-system, 'PingFang SC', 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-full: 9999px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: linear-gradient(135deg, #E8E4EC 0%, #F0ECF4 50%, #E4E0EC 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  -webkit-font-smoothing: antialiased;
}

.phone-frame {
  width: 390px; height: 844px;
  border-radius: 44px;
  background: var(--background);
  overflow: hidden; position: relative;
  box-shadow: 0 0 0 2px #1a1a1a, 0 0 0 5px #3a3a3a, 0 25px 60px rgba(0,0,0,0.18), 0 8px 20px rgba(0,0,0,0.10);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

/* Status Bar */
.status-bar {
  height: 54px;
  padding: 14px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 600; color: var(--on-surface); }
.status-icons { display: flex; gap: 5px; align-items: center; }
.status-icons svg { width: 18px; height: 18px; fill: var(--on-surface); }

/* Top Bar */
.top-bar {
  display: flex;
  align-items: center;
  padding: 10px 16px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--outline-light);
  flex-shrink: 0;
}
.top-bar-left {
  width: 44px; height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: var(--radius-full);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.top-bar-left:hover { background: var(--surface-container); }
.top-bar-left:active { transform: scale(0.93); }
.top-bar-left svg { width: 22px; height: 22px; fill: var(--on-surface); }

.top-bar-center {
  flex: 1;
  text-align: center;
}
.top-bar-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--on-surface);
}
.top-bar-status {
  font-size: 12px;
  color: var(--success);
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin-top: 1px;
}
.status-dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  display: inline-block;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.top-bar-right {
  width: 44px; height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: none;
  background: none;
  cursor: pointer;
  border-radius: var(--radius-full);
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.top-bar-right:hover { background: var(--surface-container); }
.top-bar-right:active { transform: scale(0.93); }
.top-bar-right svg { width: 22px; height: 22px; fill: var(--on-surface); }

/* Chat Area */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  scrollbar-width: none;
  -ms-overflow-style: none;
  background: var(--background);
}
.chat-area::-webkit-scrollbar { display: none; }

/* Message Row */
.msg-row {
  display: flex;
  gap: 8px;
  max-width: 85%;
}
.msg-row.ai { align-self: flex-start; }
.msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  color: white;
  flex-shrink: 0;
  margin-top: 2px;
  background: linear-gradient(135deg, #A88DE0, #7C5CBF);
}
.msg-row.user .msg-avatar { display: none; }

.msg-bubble {
  padding: 12px 16px;
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
  position: relative;
}
.msg-row.ai .msg-bubble {
  background: var(--surface-container);
  color: var(--on-surface);
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.msg-row.user .msg-bubble {
  background: var(--primary);
  color: var(--on-primary);
  border-radius: 16px 4px 16px 16px;
  box-shadow: 0 1px 3px rgba(124,92,191,0.2);
}

/* Timestamp */
.msg-time {
  font-size: 11px;
  color: var(--outline);
  margin-top: 4px;
  padding: 0 4px;
}
.msg-row.user .msg-time { text-align: right; }

/* Typing Indicator */
.typing-row {
  display: flex;
  gap: 8px;
  align-self: flex-start;
  max-width: 85%;
}
.typing-bubble {
  background: var(--surface-container);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 5px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.typing-dot {
  width: 7px; height: 7px;
  background: var(--outline);
  border-radius: 50%;
  animation: typingBounce 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* Input Bar */
.input-bar {
  background: var(--surface);
  border-top: 1px solid var(--outline-light);
  padding: 10px 12px 34px;
  display: flex;
  align-items: flex-end;
  gap: 6px;
  flex-shrink: 0;
}
.input-btn {
  width: 38px; height: 38px;
  border: none;
  background: none;
  border-radius: var(--radius-full);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.input-btn:hover { background: var(--surface-container); }
.input-btn:active { transform: scale(0.9); }
.input-btn svg { width: 22px; height: 22px; fill: var(--on-surface-variant); }
.input-btn.primary-btn {
  background: var(--primary);
  width: 38px; height: 38px;
}
.input-btn.primary-btn svg { fill: white; }
.input-btn.primary-btn:hover { background: var(--primary-light); }

.input-field {
  flex: 1;
  min-height: 38px;
  max-height: 100px;
  border: none;
  background: var(--surface-container);
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 15px;
  color: var(--on-surface);
  font-family: var(--font);
  outline: none;
  resize: none;
  line-height: 1.35;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.input-field::placeholder { color: var(--outline); }
.input-field:focus {
  box-shadow: 0 0 0 3px rgba(124,92,191,0.12);
  background: var(--surface);
}

/* Chat entrance animations */
@keyframes chatFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.msg-row, .typing-row {
  animation: chatFadeIn 0.35s ease-out both;
}
.msg-row:nth-child(1) { animation-delay: 0.1s; }
.msg-row:nth-child(2) { animation-delay: 0.25s; }
.msg-row:nth-child(3) { animation-delay: 0.4s; }
.msg-row:nth-child(4) { animation-delay: 0.55s; }
.typing-row { animation-delay: 0.7s; }

/* Date separator */
.date-sep {
  text-align: center;
  font-size: 12px;
  color: var(--outline);
  padding: 4px 0;
  font-weight: 500;
}

/* Quick Action Row (below latest AI message) */
.quick-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  padding-left: 40px;
  animation: chatFadeIn 0.35s ease-out both;
  animation-delay: 0.65s;
}
.quick-action-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: var(--radius-full);
  border: 1px solid var(--outline-light);
  background: var(--surface);
  color: var(--on-surface-variant);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.quick-action-btn:hover {
  background: var(--primary-container);
  border-color: var(--primary-light);
  color: var(--primary);
  box-shadow: 0 2px 6px rgba(124,92,191,0.12);
}
.quick-action-btn:active {
  transform: scale(0.95);
}
.quick-action-btn svg {
  width: 15px;
  height: 15px;
  fill: currentColor;
}
.quick-action-btn.primary-action {
  background: var(--primary-container);
  border-color: transparent;
  color: var(--primary);
  font-weight: 600;
}
.quick-action-btn.primary-action:hover {
  background: var(--primary);
  color: white;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3a4.237 4.237 0 00-6 0zm-4-4l2 2a7.074 7.074 0 0110 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Top Bar -->
  <div class="top-bar">
    <button class="top-bar-left">
      <svg viewBox="0 0 24 24"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
    </button>
    <div class="top-bar-center">
      <div class="top-bar-title">对话</div>
      <div class="top-bar-status">
        <span class="status-dot"></span>
        已就绪
      </div>
    </div>
    <button class="top-bar-right">
      <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
    </button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="date-sep">今天</div>

    <!-- AI Message 1 -->
    <div class="msg-row ai">
      <div class="msg-avatar">AI</div>
      <div>
        <div class="msg-bubble">你好！我是你的 AI 伙伴，很高兴见到你。今天想聊点什么呢？我可以陪你聊天、帮你学习、或者一起讲故事。</div>
        <div class="msg-time">下午 2:30</div>
      </div>
    </div>

    <!-- User Message 1 -->
    <div class="msg-row user">
      <div>
        <div class="msg-bubble">今天过得怎么样？</div>
        <div class="msg-time">下午 2:31</div>
      </div>
    </div>

    <!-- AI Message 2 -->
    <div class="msg-row ai">
      <div class="msg-avatar">AI</div>
      <div>
        <div class="msg-bubble">今天过得充实呢！我学了一些新的知识，现在很期待和你分享。你那边有什么有趣的事情发生吗？</div>
        <div class="msg-time">下午 2:31</div>
      </div>
    </div>

    <!-- User Message 2 -->
    <div class="msg-row user">
      <div>
        <div class="msg-bubble">没什么特别的，就是想找你聊聊天 &#128522;</div>
        <div class="msg-time">下午 2:32</div>
      </div>
    </div>

    <!-- Typing Indicator -->
    <div class="typing-row">
      <div class="msg-avatar" style="background: linear-gradient(135deg, #A88DE0, #7C5CBF); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;">AI</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <!-- Quick Actions (below latest AI message) -->
    <div class="quick-actions">
      <button class="quick-action-btn primary-action">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.17L4 17.17V4h16v12zM7 9h2v2H7zm4 0h2v2h-2zm4 0h2v2h-2z"/></svg>
        继续聊聊
      </button>
      <button class="quick-action-btn">
        <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        生成此刻图片
      </button>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-bar">
    <button class="input-btn">
      <svg viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
    </button>
    <button class="input-btn">
      <svg viewBox="0 0 24 24"><path d="M12 2L9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2zm0 3.7l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.02l-3.77 2.26 1-4.28-3.32-2.88 4.38-.38L12 5.7z"/></svg>
    </button>
    <textarea class="input-field" rows="1" placeholder="输入消息..."></textarea>
    <button class="input-btn">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
    </button>
    <button class="input-btn primary-btn">
      <svg viewBox="0 0 24 24"><path d="M4 12l1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8-8 8z"/></svg>
    </button>
    <button class="input-btn">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
  </div>
</div>

<script>
// Auto-resize textarea
const textarea = document.querySelector('.input-field');
textarea.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
