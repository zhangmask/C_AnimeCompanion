service:
  backend: http

jobs:
  demo:
    backend: base
    description: "demo job description"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "query"
        min_score:
          type: number
          description: "min score"
          default: 0.5
      required:
        - query
    steps:
      - backend: demo_echo_step1
      - backend: demo_echo_step2

  add:
    backend: base
    description: "add two numbers"
    parameters:
      type: object
      properties:
        a:
          type: number
          description: "first addend"
        b:
          type: number
          description: "second addend"
      required:
        - a
        - b
    steps:
      - backend: add_step

  stream_demo:
    backend: stream
    description: "stream demo job: repeat query 10x and stream char-by-char"
    parameters:
      type: object
      properties:
        query:
          type: string
          description: "query to echo"
        repeat:
          type: integer
          description: "number of times to repeat the query"
          default: 10
        interval:
          type: number
          description: "seconds between chunks"
          default: 0.1
      required:
        - query
    steps:
      - backend: stream_demo_step1
      - backend: stream_demo_step2
