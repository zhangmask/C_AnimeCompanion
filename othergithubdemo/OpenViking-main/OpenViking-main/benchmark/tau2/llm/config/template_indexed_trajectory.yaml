extends: baseline.yaml

benchmark:
  name: tau2_template_indexed_trajectory
  strategy_concurrency: 16
  task_max_concurrency: 5
  corpus_prepare_concurrency: 1

strategies:
  - id: no_memory
    label: TAU-2 no-memory same-seed baseline
    memory_backend: none

  - id: template_indexed_trajectory_top4_prewrite_top2
    label: Template-indexed trajectory top4 first-user + pre-write top2
    memory_backend: openviking
    train_required: true
    corpus_id: memory_v2_operation_family_v1_success_only
    train_memory_mode: experience_only
    train_transcript_format: role_tool_blocks
    train_include_system_prompt: true
    train_skip_failed_sessions: true
    search_memory_type: trajectories
    retrieval_mode: first_user_prewrite
    retrieval_top_k: 4
    first_user_inject_top_k: 4
    prewrite_retrieval_top_k: 2
    prewrite_inject_top_k: 2
    scope_prompt_file: benchmark/tau2/llm/config/scope_prompts/generic_memory_scope.md
