services:
  prometheus:
    image: prom/prometheus
    container_name: openviking-prometheus
    ports:
      - "30909:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana
    container_name: openviking-grafana
    depends_on:
      - prometheus
    ports:
      - "13000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./openviking_demo_dashboard.json:/var/lib/grafana/dashboards/openviking_demo_dashboard.json:ro
      - ./openviking_feedback_baseline_dashboard.json:/var/lib/grafana/dashboards/openviking_feedback_baseline_dashboard.json:ro
      - ./openviking_token_demo_dashboard.json:/var/lib/grafana/dashboards/openviking_token_demo_dashboard.json:ro
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
