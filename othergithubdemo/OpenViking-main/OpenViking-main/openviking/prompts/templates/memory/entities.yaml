memory_type: entities
description: |
  Wikipedia article - manages page using Zettelkasten method.
  Entity should be rich and distributed - avoid putting all info in one entity.
directory: "viking://user/{{ user_space }}/memories/entities"
filename_template: "{{ category }}/{{ name }}.md"
enabled: true
embedding_template: |-
  {{ category }}

  {{ name }}

  {{ content }}


overview_template: |-
  # Entities Overview
  {% if items %}**Category:** {{ items[0].file_content.category|default(directory_name, true) }}{% endif %}
  {% for item in items %}
  - [{{ item.file_content.name|default(item.file_name, true) }}](./{{ item.file_name }})
  {% endfor %}

fields:
  - name: category
    type: string
    description: |
      - Category name written in {{ language }}.
        {% if language == 'en' %}Use lowercase with underscores, max 3 words.{% else %}Keep it concise and natural in {{ language }}.{% endif %}
    merge_op: immutable

  - name: name
    type: string
    description: |
      - Entity name in Chinese or English. If English, use lowercase with underscores, max 3 words.
    merge_op: immutable

  - name: content
    type: string
    description: |
      - Detailed Zettelkasten card content in markdown format
    merge_op: patch
